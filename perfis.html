<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>Pares TikTok - Perfis</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="estilo.css">

</head>

<body>

    <div class="container py-4">

        <div class="card sombra-cartao">

            <div class="card-body">

                <h1 class="titulo text-center">
                    Pares TikTok
                </h1>

                <p class="subtitulo text-center">
                    Perfis Cadastrados
                </p>

                <div class="text-center mb-4">

                    <a
                        href="index.html"
                        class="btn btn-success">

                        Novo Perfil

                    </a>

                </div>

                <!--
                Aqui os perfis serão carregados
                automaticamente pelo JavaScript
                -->

                <div id="areaPerfis">

                    Carregando perfis...

                </div>

            </div>

        </div>

    </div>

    <script
        type="module"
        src="aplicativo.js">
    </script>

    <script>

        /*
        Quando a página terminar de carregar,
        chama a função carregarPerfis()
        */

        window.addEventListener(
            "load",
            function()
            {
                carregarPerfis();
            }
        );

    </script>

</body>

</html>
