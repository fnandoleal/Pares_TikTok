<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>Painel Ao Vivo</title>

<style>

body{

    margin:0;

    background:transparent;

    color:white;

    font-family:Arial, sans-serif;

}

#painel{

    width:100%;

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

}

#totalParticipantes{

    font-size:120px;

    font-weight:bold;

    color:#ff4fa0;

    line-height:1;

}

#textoTotal{

    font-size:40px;

    margin-bottom:30px;

}

#nomeDestaque{

    font-size:60px;

    font-weight:bold;

    color:white;

    transition:all 1s;

}

#legenda{

    font-size:28px;

    color:#cccccc;

    margin-top:10px;

}

#novoCadastro{

    display:none;

    margin-top:25px;

    padding:20px;

    border-radius:15px;

    background:#ff4fa0;

    color:white;

    font-size:45px;

    font-weight:bold;

}

</style>

</head>

<body>

<div id="painel">

    <div id="totalParticipantes">

        0

    </div>

    <div id="textoTotal">

        CADASTRADOS

    </div>

    <div id="nomeDestaque">

        @usuario

    </div>

    <div id="legenda">

        Participante em destaque

    </div>

    <div id="novoCadastro">

    </div>

</div>

<script
    type="module"
    src="painel.js">
</script>

</body>

</html>
