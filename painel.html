<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
   content="width=device-width, initial-scale=1">

<title>Painel Ao Vivo</title>

<style>

body{

    margin:0;

    padding:0;

    background:transparent;

    color:white;

    font-family:Arial, sans-serif;

    overflow:hidden;

}

#painelPrincipal{

    width:100%;

    height:100vh;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

}

#totalParticipantes{

    font-size:350px;

    font-weight:bold;

    color:#ff4fa0;

    line-height:0.9;

    text-shadow:
        0 0 15px #ff4fa0,
        0 0 30px #ff4fa0,
        0 0 50px #ff4fa0;

    transition:0.3s;

}

#textoTotal{

    font-size:80px;

    font-weight:bold;

    letter-spacing:8px;

    color:white;

    background:rgba(0,0,0,0.55);

    padding:10px 30px;

    border-radius:20px;

    margin-bottom:50px;

    text-shadow:
        0 0 10px #000,
        0 0 20px #000;

}

#nomeDestaque{

    font-size:150px;

    font-weight:bold;

    color:white;

    text-shadow:
        0 0 10px #ff4fa0,
        0 0 20px #ff4fa0;

    transition:1s;

    min-height:170px;

}

#mensagemDivulgacao{

    display:none;

    font-size:120px;

    font-weight:bold;

    color:white;

    text-align:center;

    text-shadow:
        0 0 10px #ff4fa0,
        0 0 20px #ff4fa0;

}

#novoCadastro{

    display:none;

    width:100%;

    height:100vh;

    justify-content:center;

    align-items:center;

    text-align:center;

    flex-direction:column;

    font-size:100px;

    font-weight:bold;

    color:white;

    text-shadow:
        0 0 15px #ff4fa0,
        0 0 30px #ff4fa0,
        0 0 50px #ff4fa0;

}

</style>

</head>

<body>

<div id="painelPrincipal">

<div id="totalParticipantes">

    0

</div>

<div id="textoTotal">

    CADASTRADOS

</div>

<div id="nomeDestaque">

    @usuario

</div>

<div id="mensagemDivulgacao">

    CADASTRO GRATUITO

    <br><br>

    tinyurl.com/paresaovivo

</div>

</div>

<div id="novoCadastro">

</div>

<script
    type="module"
    src="painel.js">
</script>

</body>

</html>
