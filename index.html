<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- ========================================
         CONFIGURAÇÕES DA PÁGINA
    ========================================= -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>Pares TikTok - Cadastro</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Estilo do projeto -->

    <link
        rel="stylesheet"
        href="estilo.css">

</head>

<body>

    <!-- ========================================
         CONTAINER PRINCIPAL
    ========================================= -->

    <div class="container py-4">

        <div class="card sombra-cartao">

            <div class="card-body">

                <h1 class="titulo text-center">
                    Pares TikTok
                </h1>

                <p class="subtitulo text-center">
                    Cadastro de Perfil
                </p>

                <!-- ========================================
                     TIKTOK
                ========================================= -->

                <div class="mb-3">

                    <label
                        for="tiktok"
                        class="form-label">

                        @ TikTok

                    </label>

                    <input
                        type="text"
                        id="tiktok"
                        class="form-control"
                        placeholder="@usuario">

                </div>

                <!-- ========================================
                     ESTADO
                ========================================= -->

                <div class="mb-3">

                    <label
                        for="estado"
                        class="form-label">

                        Estado

                    </label>

                    <select
                        id="estado"
                        class="form-select"
                        onchange="carregarCidades()">

                        <option value="">
                            Selecione
                        </option>

                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>

                    </select>

                </div>

                <!-- ========================================
                     MUNICÍPIO
                ========================================= -->

                <div class="mb-3">

                    <label
                        for="cidade"
                        class="form-label">

                        Município

                    </label>

                    <select
                        id="cidade"
                        class="form-select">

                        <option value="">
                            Selecione um estado primeiro
                        </option>

                    </select>

                </div>

                <!-- ========================================
                     IDADE
                ========================================= -->

                <div class="mb-3">

                    <label
                        for="idade"
                        class="form-label">

                        Idade

                    </label>

                    <input
                        type="number"
                        id="idade"
                        class="form-control"
                        min="18">

                </div>

                <!-- ========================================
                     SEXO
                ========================================= -->

                <div class="mb-3">

                    <label
                        for="sexo"
                        class="form-label">

                        Sexo

                    </label>

                    <select
                        id="sexo"
                        class="form-select">

                        <option value="">
                            Selecione
                        </option>

                        <option value="H">
                            Homem
                        </option>

                        <option value="M">
                            Mulher
                        </option>

                    </select>

                </div>

                <!-- ========================================
                     SITUAÇÃO
                ========================================= -->

                <div class="mb-4">

                    <label
                        for="situacao"
                        class="form-label">

                        Situação

                    </label>

                    <select
                        id="situacao"
                        class="form-select">

                        <option value="ativo">
                            Ativo
                        </option>

                        <option value="inativo">
                            Inativo
                        </option>

                    </select>

                </div>

                <!-- ========================================
                     BOTÃO SALVAR
                ========================================= -->

                <button
                    class="btn btn-primary w-100"
                    onclick="salvarPerfil()">

                    Salvar Perfil

                </button>

                <!-- ========================================
                     BOTÃO PERFIS
                ========================================= -->

                <div class="mt-2">

                    <a
                        href="perfis.html"
                        class="btn btn-success w-100">

                        Ver Perfis

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- ========================================
         JAVASCRIPT
    ========================================= -->

    <script
        type="module"
        src="aplicativo.js">
    </script>

</body>
