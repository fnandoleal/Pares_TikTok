<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- ========================================
         CONFIGURAÇÕES DA PÁGINA
    ========================================= -->

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1">

    <title>Pares TikTok - Cadastro</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Estilo do projeto -->

    <link
        rel="stylesheet"
        href="estilo.css">

</head>

<body>

    <!-- ========================================
         CONTAINER PRINCIPAL
    ========================================= -->

    <div class="container py-4">

        <div class="card sombra-cartao">

            <div class="card-body">

                <h1 class="titulo text-center">
                    Pares TikTok
                </h1>

                <p class="subtitulo text-center">
                    Cadastro de Perfil
                </p>

                <!-- ========================================
                     TIKTOK
                ========================================= -->

                <div class="mb-3">

                    <label
                        for="tiktok"
                        class="form-label">

                        @ TikTok

                    </label>

                    <input
                        type="text"
                        id="tiktok"
                        class="form-control"
                        placeholder="@usuario">

                </div>

                <!-- ========================================
                     CIDADE
                ========================================= -->

                <div class="mb-3">

                    <label
                        for="cidade"
                        class="form-label">

                        Cidade

                    </label>

                    <input
                        type="text"
                        id="cidade"
                        class="form-control"
                        placeholder="Cidade">

                </div>

                <!-- ========================================
                     IDADE
                ========================================= -->

                <div class="mb-3">

                    <label
                        for="idade"
                        class="form-label">

                        Idade

                    </label>

                    <input
                        type="number"
                        id="idade"
                        class="form-control"
                        min="18">

                </div>

                <!-- ========================================
                     SEXO
                ========================================= -->

                <div class="mb-3">

                    <label
                        for="sexo"
                        class="form-label">

                        Sexo

                    </label>

                    <select
                        id="sexo"
                        class="form-select">

                        <option value="">
                            Selecione
                        </option>

                        <option value="H">
                            Homem
                        </option>

                        <option value="M">
                            Mulher
                        </option>

                    </select>

                </div>

                <!-- ========================================
                     SITUAÇÃO
                ========================================= -->

                <div class="mb-4">

                    <label
                        for="situacao"
                        class="form-label">

                        Situação

                    </label>

                    <select
                        id="situacao"
                        class="form-select">

                        <option value="ativo">
                            Ativo
                        </option>

                        <option value="inativo">
                            Inativo
                        </option>

                    </select>

                </div>

                <!-- ========================================
                     BOTÃO SALVAR
                ========================================= -->

                <button
                    class="btn btn-primary w-100"
                    onclick="salvarPerfil()">

                    Salvar Perfil

                </button>

            </div>

        </div>

    </div>

    <!-- ========================================
         JAVASCRIPT DO PROJETO
    ========================================= -->

    <script
        type="module"
        src="aplicativo.js">
    </script>

</body>

</html>
