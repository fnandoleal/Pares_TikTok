<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Pares TikTok - Moderação</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="estilo.css">

</head>

<body>

    <!-- ========================================
         PROTEÇÃO DA MODERAÇÃO
    ========================================= -->

    <script>

        const senhaSalva =
            localStorage.getItem(
                "moderador"
            );

        if (
            senhaSalva !== "ok"
        ) {

            const senha =
                prompt(
                    "Senha da moderação:"
                );

            if (
                senha === "PTK2026!"
            ) {

                localStorage.setItem(
                    "moderador",
                    "ok"
                );

            }
            else {

                alert(
                    "Acesso negado."
                );

                window.location.href =
                    "index.html";

            }

        }

    </script>

    <div class="container py-4">

        <div class="card sombra-cartao">

            <div class="card-body">

                <h1 class="titulo text-center">

                    Moderação

                </h1>

                <p class="subtitulo text-center">

                    Painel de Moderação

                </p>

                <!-- ========================================
                     ABAS
                ========================================= -->

                <ul class="nav nav-tabs">

                    <li class="nav-item">

                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#abaPendentes">

                            Pendentes

                        </button>

                    </li>

                    <li class="nav-item">

                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#abaAtivos">

                            Ativos

                        </button>

                    </li>

                    <li class="nav-item">

                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#abaExclusoes">

                            Exclusões

                        </button>

                    </li>

                </ul>

                <!-- ========================================
                     CONTEÚDO DAS ABAS
                ========================================= -->

                <div class="tab-content mt-3">

                    <!-- ========================================
                         PENDENTES
                    ========================================= -->

                    <div class="tab-pane fade show active" id="abaPendentes">

                        <div id="areaPendentes">

                            Carregando...

                        </div>

                    </div>

                    <!-- ========================================
                         ATIVOS
                    ========================================= -->

                    <div class="tab-pane fade" id="abaAtivos">

                        <div id="areaAtivos">

                            Carregando...

                        </div>

                        <hr>

                        <h4>

                            Combinações

                        </h4>

                        <div id="areaCombinacoes">

                            Selecione um participante para gerar combinações.

                        </div>

                    </div>

                    <!-- ========================================
                         EXCLUSÕES
                    ========================================= -->

                    <div class="tab-pane fade" id="abaExclusoes">

                        <div id="areaExclusoes">

                            Carregando...

                        </div>

                    </div>

                </div>

                <hr>

                <div class="text-center">

                    <button class="btn btn-dark" onclick="sairModeracao()">

                        Sair

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- ========================================
         BOOTSTRAP JS
    ========================================= -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- ========================================
         APLICAÇÃO
    ========================================= -->

    <script type="module" src="aplicativo.js">
    </script>

    <script>

        window.addEventListener(
            "load",
            function () {

                carregarPendentes();

                carregarAtivos();

                carregarExclusoes();

            }
        );

    </script>

</body>

</html>
